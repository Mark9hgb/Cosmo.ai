name: termux_ai_assistant
description: AI-powered terminal assistant that bridges to Termux for command execution.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Intent handling for Termux communication
  android_intent_plus: ^5.0.2
  
  # Terminal emulation
  xterm: ^4.0.0
  
  # UI Components
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  flutter_highlight: ^0.7.0
  flutter_markdown: ^0.7.1
  
  # Networking for Nvidia NIM API
  dio: ^5.4.3+1
  
  # File system access
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  file_picker: ^8.0.3
  
  # Share/Export
  share_plus: ^9.0.0
  archive: ^3.6.1
  path: ^1.9.0
  
  # Utilities
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  equatable: ^2.0.5
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/fonts/
  
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700